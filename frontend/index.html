<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting App</title>
    <meta name="description" content="An awards-show style voting platform.">
    <link rel="stylesheet" href="/styles.css">
    <script>
        // Set theme before paint to avoid a flash.
        (function () {
            try {
                var stored = localStorage.getItem("voting.theme");
                var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
                document.documentElement.setAttribute("data-theme", theme);
            } catch (e) {
                document.documentElement.setAttribute("data-theme", "light");
            }
        })();
    </script>
</head>
<body>
    <header class="topbar">
        <a href="#/" class="brand" aria-label="Voting App home">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="44" stroke="currentColor" stroke-width="2.5"/>
                    <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="50" y1="6" x2="50" y2="13"/>
                        <line x1="50" y1="87" x2="50" y2="94"/>
                        <line x1="6" y1="50" x2="13" y2="50"/>
                        <line x1="87" y1="50" x2="94" y2="50"/>
                    </g>
                    <path d="M30 33 L50 70 L70 33" stroke="currentColor" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
                </svg>
            </span>
            Voting App
        </a>
        <nav id="nav" aria-label="Primary"></nav>
        <div class="actions" id="actions"></div>
    </header>
    <main id="view" class="view">
        <p class="muted">Loading…</p>
    </main>
    <div id="toast" class="toast" hidden></div>
    <script src="/app.js"></script>
</body>
</html>
